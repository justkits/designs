name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      packages: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Project
        uses: ./.github/actions/prepare
        env:
          NPM_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          # 이 명령어들은 package.json에 정의한 스크립트를 실행합니다.
          version: pnpm run version
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Link published packages to repository
        if: steps.changesets.outputs.published == 'true'
        run: |
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"

          REPO_ID=$(gh api graphql \
            -f query='query GetRepo($owner: String!, $name: String!) { repository(owner: $owner, name: $name) { id } }' \
            -f owner="${REPO_OWNER}" \
            -f name="${REPO_NAME}" \
            --jq '.data.repository.id')

          echo '${{ steps.changesets.outputs.publishedPackages }}' | jq -r '.[].name' | while read -r PACKAGE_NAME; do
            PKG_ID=$(gh api graphql \
              -f query='query GetPackage($login: String!, $name: String!) { repositoryOwner(login: $login) { ... on Organization { packages(packageType: NPM, names: [$name], first: 1) { nodes { id } } } ... on User { packages(packageType: NPM, names: [$name], first: 1) { nodes { id } } } } }' \
              -f login="${REPO_OWNER}" \
              -f name="${PACKAGE_NAME}" \
              --jq '.data.repositoryOwner.packages.nodes[0].id // empty' 2>/dev/null)

            if [ -n "${PKG_ID}" ]; then
              gh api graphql \
                -f query='mutation Link($packageId: ID!, $repositoryId: ID!) { linkRepositoryToPackage(input: { packageId: $packageId, repositoryId: $repositoryId }) { package { name } } }' \
                -f packageId="${PKG_ID}" \
                -f repositoryId="${REPO_ID}" \
                && echo "✓ Linked ${PACKAGE_NAME} to ${REPO_OWNER}/${REPO_NAME}" \
                || echo "✗ Failed to link ${PACKAGE_NAME} (may already be linked)"
            fi
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
